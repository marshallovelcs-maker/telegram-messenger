<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fembo Messenger</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300ffcc'/%3E%3Ccircle cx='35' cy='40' r='5' fill='%2303050b'/%3E%3Ccircle cx='65' cy='40' r='5' fill='%2303050b'/%3E%3Cpath d='M35 60 Q50 75 65 60' stroke='%2303050b' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
    <div class="app">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="fox-icon">🦊</div>
                    <h2>FEMBO</h2>
                </div>
                <button class="new-chat-btn" id="newChatBtn" title="Создать групповой чат">+</button>
            </div>
            
            <div class="user-info">
                <span id="currentNick">Загрузка...</span>
                <button class="edit-nick-btn" id="editNickBtn">✎ Сменить ник</button>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="> Поиск по нику..." class="search-input">
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="online-users">
                <h3>[ ONLINE ]</h3>
                <div id="onlineUsersList" class="users-list">
                    <div class="empty-message">Нет пользователей онлайн</div>
                </div>
            </div>
            
            <div class="offline-users">
                <h3>[ OFFLINE ]</h3>
                <div id="offlineUsersList" class="users-list">
                    <div class="empty-message">Нет пользователей оффлайн</div>
                </div>
            </div>
            
            <div class="chats-list">
                <h3>[ CHATS ]</h3>
                <div id="chatsList" class="chats-container">
                    <div class="empty-message">Нет чатов</div>
                </div>
            </div>
        </aside>
        
        <!-- Основная область чата -->
        <main class="chat-area">
            <div class="chat-header" id="chatHeader">
                <h3>SELECT CHAT</h3>
                <button class="delete-chat-btn" id="deleteChatBtn" style="display: none;">DELETE</button>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div class="empty-chat-message">
                    <p>➤ ДОБРО ПОЖАЛОВАТЬ В FEMBO</p>
                    <p>➤ ВЫБЕРИТЕ ЧАТ ИЗ СПИСКА</p>
                    <p>➤ КЛИКНИТЕ ПО ПОЛЬЗОВАТЕЛЮ ДЛЯ ЛИЧНОГО ДИАЛОГА</p>
                </div>
            </div>
            
            <div class="message-input-container" style="display: none;">
                <div class="input-actions">
                    <textarea id="messageInput" placeholder="> Введите сообщение..." rows="3"></textarea>
                    <button id="sendMessageBtn">SEND</button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Модальное окно смены ника -->
    <div id="nickModal" class="modal">
        <div class="modal-content">
            <h3>CHANGE NICK</h3>
            <input type="text" id="newNickInput" placeholder="> введите новый ник" autocomplete="off">
            <div class="modal-buttons">
                <button id="confirmNickBtn">CONFIRM</button>
                <button id="cancelNickBtn">CANCEL</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно создания группового чата -->
    <div id="newChatModal" class="modal">
        <div class="modal-content">
            <h3>CREATE GROUP</h3>
            <input type="text" id="chatNameInput" placeholder="> название чата" autocomplete="off">
            <div class="participants-select">
                <h4>SELECT PARTICIPANTS:</h4>
                <div id="participantsList"></div>
            </div>
            <div class="modal-buttons">
                <button id="createChatBtn">CREATE</button>
                <button id="cancelChatBtn">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>
</html>
